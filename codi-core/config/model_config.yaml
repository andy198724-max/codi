model:
  base_model: "llava-hf/llava-v1.6-34b-hf"
  model_type: "llava"
  context_window: 8192
  torch_dtype: "bfloat16"
  max_images_per_message: 10
  image_size: 336
  vision_tower: "openai/clip-vit-large-patch14-336"
  mm_projector: "mlp2x_gelu"
  image_aspect_ratio: "anyres"
  chat_template: "USER: <image>\n{prompt}\nASSISTANT:"

lora:
  r: 128
  alpha: 256
  dropout: 0.07
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
    - "vision_proj"
    - "mm_projector"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  num_epochs: 3
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: "adamw_torch"
  deepspeed_config: "config/deepspeed_config.json"

inference:
  max_tokens: 8192
  temperature: 0.7
  top_p: 0.95
  repetition_penalty: 1.1
  streaming: true
  api_host: "0.0.0.0"
  api_port: 11435

vision:
  max_image_pixels: 1048576
  enable_ocr: true
  enable_diagram_parsing: true
  enable_handwriting: true
  preprocessing:
    denoise: true
    contrast_enhance: true
    deskew: true
