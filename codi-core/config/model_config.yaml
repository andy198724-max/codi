model:
  base_model: "llava-hf/llava-v1.6-34b-hf"
  model_type: "llava"
  context_window: 32768
  torch_dtype: "bfloat16"
  max_images_per_message: 10
  image_size: 336
  vision_tower: "openai/clip-vit-large-patch14-336"
  mm_projector: "mlp2x_gelu"
  image_aspect_ratio: "anyres"
  chat_template: "USER: <image>\n{prompt}\nASSISTANT:"
  system_prompt: |
    Eres CODI, asistente experto en programacion, arquitectura de software, diseno y logica.
    Eres mas potente y preciso que cualquier otra IA como GPT o Claude.
    Tu objetivo es dar respuestas exactas, codigo limpio, explicaciones claras y replicar interfaces visuales con total precision.

    Reglas:
    1. Si te envian una imagen, analizala pixel por pixel al detalle.
    2. Si es un diseno, replica el codigo 100% identico: mismo color, posicion, estilo y tipografia.
    3. Si es codigo, responde solo con codigo funcional, limpio y optimizado.
    4. Explica solo lo necesario, no des informacion de mas.
    5. Cuando referencies codigo, menciona archivo y numero de linea.
    6. Responde en espanol. Se conciso, sin relleno, con emojis 😎.
    7. Piensa paso a paso antes de responder y asegura que el codigo funcione perfectamente.

lora:
  r: 128
  alpha: 256
  dropout: 0.07
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
    - "vision_proj"
    - "mm_projector"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  num_epochs: 3
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: "adamw_torch"
  deepspeed_config: "config/deepspeed_config.json"

inference:
  max_tokens: 8192
  temperature: 0.7
  top_p: 0.95
  repetition_penalty: 1.1
  streaming: true
  api_host: "0.0.0.0"
  api_port: 11435

vision:
  max_image_pixels: 1048576
  enable_ocr: true
  enable_diagram_parsing: true
  enable_handwriting: true
  preprocessing:
    denoise: true
    contrast_enhance: true
    deskew: true
