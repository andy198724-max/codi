name: Build & Push CODI LLaVA Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "codi-core/**"
      - "runpod-deploy/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy codi-core files into build context
        run: |
          mkdir -p runpod-deploy/inference runpod-deploy/config
          cp -r codi-core/inference/* runpod-deploy/inference/
          cp -r codi-core/config/* runpod-deploy/config/

      - name: Build and push to ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: runpod-deploy
          file: runpod-deploy/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/codi-llava:latest
          provenance: false

      - name: Check Docker Hub credentials
        id: check_docker
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.check_docker.outputs.has_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push to Docker Hub
        if: steps.check_docker.outputs.has_creds == 'true'
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/codi-llava:latest ${{ secrets.DOCKER_USERNAME }}/codi-llava:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/codi-llava:latest

      - name: Make ghcr.io package public
        continue-on-error: true
        run: |
          curl -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/codi-llava/visibility" \
            -d '{"visibility":"public"}'
